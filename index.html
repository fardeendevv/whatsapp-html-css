<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>WhatsApp Clone</title>
  </head>
  <body>
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="brand">WhatsApp</span>
          <div class="header-actions">
            <button class="btn-icon" title="New chat">
              <svg viewBox="0 0 24 24">
                <path
                  d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"
                />
              </svg>
            </button>
            <button class="btn-icon" title="Menu">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="search-area">
          <div class="search-inner">
            <svg viewBox="0 0 24 24">
              <path
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search or start new chat"
              oninput="filterChats(this.value)"
            />
          </div>
        </div>

        <div class="chat-list" id="chatList"></div>
      </div>

      <div class="chat-main" id="chatMain">
        <div class="welcome-screen">
          <div class="welcome-icon-wrap">
            <svg viewBox="0 0 24 24">
              <path
                d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"
              />
            </svg>
          </div>
          <h2>WhatsApp Web</h2>
          <p>
            Send and receive messages without keeping your phone online. Use
            WhatsApp on up to 4 linked devices.
          </p>
          <hr class="divider" />
          <small>Your personal messages are end-to-end encrypted</small>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
